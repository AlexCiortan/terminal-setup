# --- Enhanced Tmux Configuration ---
# Production-ready tmux setup with advanced plugins

# General Settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -s escape-time 0
set -g history-limit 1000000        # 1M lines history!
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g set-clipboard on              # Use system clipboard
set -g detach-on-destroy off         # Don't exit when session closes

# Start indexing at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix key (keeping Ctrl+b, but you can change to Ctrl+a if preferred)
set -g prefix C-b
bind C-b send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "✅ Config reloaded!"

# Better pane splitting (with current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation with Alt+Arrow (no prefix needed!)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resizing panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi mode for copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Advanced session and window management plugins
set -g @plugin 'omerxx/tmux-sessionx'       # ⭐ Enhanced session management with fzf
set -g @plugin 'omerxx/tmux-floax'          # ⭐ Floating windows
set -g @plugin 'fcsonline/tmux-thumbs'      # ⭐ Quick text selection
set -g @plugin 'wfxr/tmux-fzf-url'          # ⭐ URL fuzzy finder
set -g @plugin 'catppuccin/tmux'            # ⭐ Beautiful theme
set -g @plugin 'christoomey/vim-tmux-navigator' # Seamless vim/tmux navigation

# --- Plugin Configurations ---

# sessionx - Enhanced session manager
set -g @sessionx-bind 'o'                    # Prefix + o to open session manager
set -g @sessionx-zoxide-mode 'on'            # Use zoxide for smart jumping
set -g @sessionx-filter-current 'false'      # Show current session in list
set -g @sessionx-preview-enabled 'true'      # Enable session preview
set -g @sessionx-window-height '90%'         # Preview window height
set -g @sessionx-window-width '85%'          # Preview window width

# floax - Floating windows (like VSCode terminal)
set -g @floax-bind 'p'                       # Prefix + p to toggle floating window
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'white'

# fzf-url - Open URLs with fuzzy search
set -g @fzf-url-bind 'u'                     # Prefix + u to open URL finder

# tmux-thumbs - Text selection
set -g @thumbs-key F                          # Prefix + F to activate thumbs

# Catppuccin theme configuration
set -g @catppuccin_flavor 'mocha'            # mocha, frappe, macchiato, or latte
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "directory session date_time"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# tmux-continuum - Auto-save and restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'         # Save every 15 minutes

# tmux-resurrect - Restore vim/nvim sessions
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Status bar position (you can change to 'top' if preferred)
set -g status-position bottom

# Initialize TPM (MUST be at the very end)
run '~/.tmux/plugins/tpm/tpm'
